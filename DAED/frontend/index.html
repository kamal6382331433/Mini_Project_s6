<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAED - Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom Styles -->
    <link href="css/styles.css?v=3" rel="stylesheet">
</head>

<body>

    <div class="container">
        <div class="login-container">
            <div class="card p-5">
                <div class="text-center mb-4">
                    <div class="mb-3">
                        <i class="bi bi-mortarboard-fill"
                            style="font-size: 3.5rem; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
                    </div>
                    <h2 class="text-primary-custom mb-2">DAED</h2>
                    <p class="text-muted">Digital Academic Evaluation Dashboard</p>
                    <div
                        style="height: 3px; width: 60px; background: linear-gradient(90deg, #6366f1, #8b5cf6); margin: 1rem auto; border-radius: 2px;">
                    </div>
                </div>

                <form id="loginForm">
                    <div class="mb-4">
                        <label for="username" class="form-label">
                            <i class="bi bi-person-fill me-2"></i>Username
                        </label>
                        <input type="text" class="form-control" id="username" placeholder="Enter your username"
                            required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock-fill me-2"></i>Password
                        </label>
                        <input type="password" class="form-control" id="password" placeholder="Enter your password"
                            required>
                    </div>

                    <div id="errorMessage" class="alert alert-danger d-none mb-4">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span id="errorText"></span>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>

                    <!-- Loading Spinner -->
                    <div id="loading" class="text-center mt-3 d-none">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="text-muted mt-2">Authenticating...</p>
                    </div>
                </form>

                <!-- Demo Credentials -->
                <div class="mt-4 pt-4" style="border-top: 1px solid var(--border-color);">
                    <p class="text-muted text-center mb-3" style="font-size: 0.85rem;">
                        <i class="bi bi-info-circle me-1"></i>Demo Credentials
                    </p>
                    <div class="row g-2">
                        <div class="col-4">
                            <div class="text-center p-2"
                                style="background: rgba(99, 102, 241, 0.1); border-radius: 8px; border: 1px solid rgba(99, 102, 241, 0.3);">
                                <i class="bi bi-shield-fill-check text-primary d-block mb-1"></i>
                                <small class="text-muted d-block" style="font-size: 0.7rem;">Admin</small>
                                <small class="text-primary" style="font-size: 0.75rem; font-weight: 600;">admin</small>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="text-center p-2"
                                style="background: rgba(139, 92, 246, 0.1); border-radius: 8px; border: 1px solid rgba(139, 92, 246, 0.3);">
                                <i class="bi bi-person-badge-fill" style="color: #8b5cf6;" class="d-block mb-1"></i>
                                <small class="text-muted d-block" style="font-size: 0.7rem;">Faculty</small>
                                <small style="color: #8b5cf6; font-size: 0.75rem; font-weight: 600;">faculty</small>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="text-center p-2"
                                style="background: rgba(16, 185, 129, 0.1); border-radius: 8px; border: 1px solid rgba(16, 185, 129, 0.3);">
                                <i class="bi bi-person-fill text-success d-block mb-1"></i>
                                <small class="text-muted d-block" style="font-size: 0.7rem;">Student</small>
                                <small class="text-success"
                                    style="font-size: 0.75rem; font-weight: 600;">student</small>
                            </div>
                        </div>
                    </div>
                    <p class="text-center text-muted mt-2" style="font-size: 0.75rem;">
                        Password: <code
                            style="background: var(--bg-darker); padding: 2px 8px; border-radius: 4px; color: var(--primary);">password123</code>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Auth Logic -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
