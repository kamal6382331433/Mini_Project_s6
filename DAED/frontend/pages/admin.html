<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAED - Admin Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom Styles -->
    <link href="../css/styles.css?v=2" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-shield-fill-check me-2"></i>DAED Admin
            </a>
            <button class="btn btn-outline-light" onclick="logout()">
                <i class="bi bi-box-arrow-right me-2"></i>Logout
            </button>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="gradient-text mb-1">Admin Dashboard</h2>
                <p class="text-muted">Manage students, faculty, and subjects</p>
            </div>
        </div>

        <ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="student-tab" data-bs-toggle="tab" data-bs-target="#student"
                    type="button" role="tab">
                    <i class="bi bi-people-fill me-2"></i>Students
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="faculty-tab" data-bs-toggle="tab" data-bs-target="#faculty" type="button"
                    role="tab">
                    <i class="bi bi-person-badge-fill me-2"></i>Faculty
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="subject-tab" data-bs-toggle="tab" data-bs-target="#subject" type="button"
                    role="tab">
                    <i class="bi bi-book-fill me-2"></i>Subjects
                </button>
            </li>
        </ul>

        <div class="tab-content" id="myTabContent">
            <!-- Student Management -->
            <div class="tab-pane fade show active" id="student" role="tabpanel">
                <div class="card p-4 mb-4 hover-lift">
                    <h4 class="mb-4">
                        <i class="bi bi-person-plus-fill me-2 text-primary"></i>Add New Student
                    </h4>
                    <form id="addStudentForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Username</label>
                                <input type="text" class="form-control" id="s_username" placeholder="Enter username"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" id="s_password" placeholder="Enter password"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="s_fullname" placeholder="Enter full name"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="s_email" placeholder="student@example.com"
                                    required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Roll Number</label>
                                <input type="text" class="form-control" id="s_roll" placeholder="e.g., 2024001"
                                    required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Department</label>
                                <input type="text" class="form-control" id="s_dept" placeholder="e.g., Computer Science"
                                    required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Semester</label>
                                <input type="number" class="form-control" id="s_sem" placeholder="1-8" min="1" max="8"
                                    required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary mt-4">
                            <i class="bi bi-plus-circle me-2"></i>Add Student
                        </button>
                    </form>
                </div>
                <div class="card p-4">
                    <h4 class="mb-4">
                        <i class="bi bi-list-ul me-2 text-primary"></i>Student List
                    </h4>
                    <div id="studentListContainer">
                        <div class="text-center py-4">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Faculty Management -->
            <div class="tab-pane fade" id="faculty" role="tabpanel">
                <div class="card p-4 mb-4 hover-lift">
                    <h4 class="mb-4">
                        <i class="bi bi-person-plus-fill me-2 text-primary"></i>Add New Faculty
                    </h4>
                    <form id="addFacultyForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Username</label>
                                <input type="text" class="form-control" id="f_username" placeholder="Enter username"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" id="f_password" placeholder="Enter password"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="f_fullname" placeholder="Enter full name"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="f_email" placeholder="faculty@example.com"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Department</label>
                                <input type="text" class="form-control" id="f_dept" placeholder="e.g., Computer Science"
                                    required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Designation</label>
                                <input type="text" class="form-control" id="f_desig" placeholder="e.g., Professor"
                                    required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary mt-4">
                            <i class="bi bi-plus-circle me-2"></i>Add Faculty
                        </button>
                    </form>
                </div>
                <div class="card p-4">
                    <h4 class="mb-4">
                        <i class="bi bi-list-ul me-2 text-primary"></i>Faculty List
                    </h4>
                    <div id="facultyListContainer">
                        <div class="text-center py-4">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Subject Management -->
            <div class="tab-pane fade" id="subject" role="tabpanel">
                <div class="card p-4 mb-4 hover-lift">
                    <h4 class="mb-4">
                        <i class="bi bi-book-half me-2 text-primary"></i>Add New Subject
                    </h4>
                    <form id="addSubjectForm">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label">Subject Code</label>
                                <input type="text" class="form-control" id="sub_code" placeholder="e.g., CS101"
                                    required>
                            </div>
                            <div class="col-md-5">
                                <label class="form-label">Subject Name</label>
                                <input type="text" class="form-control" id="sub_name"
                                    placeholder="e.g., Data Structures" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Department</label>
                                <input type="text" class="form-control" id="sub_dept" placeholder="e.g., CSE" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Semester</label>
                                <input type="number" class="form-control" id="sub_sem" placeholder="1-8" min="1" max="8"
                                    required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary mt-4">
                            <i class="bi bi-plus-circle me-2"></i>Add Subject
                        </button>
                    </form>
                </div>
                <div class="card p-4 mb-4 hover-lift">
                    <h4 class="mb-4">
                        <i class="bi bi-link-45deg me-2 text-warning"></i>Assign Faculty to Subject
                    </h4>
                    <form id="assignFacultyForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Subject ID</label>
                                <input type="number" class="form-control" id="assign_sub_id"
                                    placeholder="Enter subject ID" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Faculty ID</label>
                                <input type="number" class="form-control" id="assign_fac_id"
                                    placeholder="Enter faculty ID" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-warning mt-4">
                            <i class="bi bi-link me-2"></i>Assign Faculty
                        </button>
                    </form>
                </div>
                <div class="card p-4">
                    <h4 class="mb-4">
                        <i class="bi bi-list-ul me-2 text-primary"></i>Subject List
                    </h4>
                    <div id="subjectListContainer">
                        <div class="text-center py-4">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/admin.js"></script>
</body>

</html>
