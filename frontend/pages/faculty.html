<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAED - Faculty Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom Styles -->
    <link href="../css/styles.css?v=2" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-person-badge me-2"></i>DAED Faculty
            </a>
            <button class="btn btn-outline-light" onclick="logout()">
                <i class="bi bi-box-arrow-right me-2"></i>Logout
            </button>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <div class="mb-4">
            <h2 class="gradient-text mb-1">Faculty Dashboard</h2>
            <p class="text-muted">Manage student marks and attendance</p>
        </div>

        <div class="card p-4 mb-4">
            <h4 class="mb-3">
                <i class="bi bi-book me-2 text-primary"></i>Assigned Subjects
            </h4>
            <div id="assignedSubjects" class="text-muted">
                <i class="bi bi-info-circle me-2"></i>Please enter Subject IDs below. (Faculty Mapping pending in UI)
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="card p-4 hover-lift">
                    <h4 class="mb-4">
                        <i class="bi bi-pencil-square me-2 text-success"></i>Enter Marks
                    </h4>
                    <form id="marksForm">
                        <div class="mb-3">
                            <label class="form-label">Student ID</label>
                            <input type="number" class="form-control" id="m_stud_id" placeholder="Enter student ID"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Subject ID</label>
                            <input type="number" class="form-control" id="m_sub_id" placeholder="Enter subject ID"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Internal Marks</label>
                            <input type="number" class="form-control" id="m_int" placeholder="0-50" min="0" max="50"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">External Marks</label>
                            <input type="number" class="form-control" id="m_ext" placeholder="0-50" min="0" max="50"
                                required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">
                            <i class="bi bi-check-circle me-2"></i>Submit Marks
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card p-4 hover-lift">
                    <h4 class="mb-4">
                        <i class="bi bi-calendar-check me-2 text-info"></i>Update Attendance
                    </h4>
                    <form id="attendanceForm">
                        <div class="mb-3">
                            <label class="form-label">Student ID</label>
                            <input type="number" class="form-control" id="a_stud_id" placeholder="Enter student ID"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Subject ID</label>
                            <input type="number" class="form-control" id="a_sub_id" placeholder="Enter subject ID"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Total Classes</label>
                            <input type="number" class="form-control" id="a_total" placeholder="Total classes conducted"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Attended Classes</label>
                            <input type="number" class="form-control" id="a_attended" placeholder="Classes attended"
                                required>
                        </div>
                        <button type="submit" class="btn btn-info w-100">
                            <i class="bi bi-check-circle me-2"></i>Update Attendance
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/faculty.js"></script>
</body>

</html>
